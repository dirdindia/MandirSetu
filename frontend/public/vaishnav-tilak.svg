<svg width="200" height="380" viewBox="0 -50 100 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .draw {
      stroke-dasharray: 260;
      stroke-dashoffset: 260;
      animation: drawLine 2.5s ease-in-out forwards;
    }
    .fade-in {
      opacity: 0;
      animation: fadeIn 1s ease-in forwards 2s;
    }
    .floating {
      animation: float 4s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
  <g class="floating">
    <!-- U Shape -->
    <path class="draw" d="M 30 -30 L 30 65 A 20 20 0 0 0 70 65 L 70 -30" stroke="#FFFFFF" stroke-width="12" stroke-linecap="butt" />
    
    <!-- Connecting Stem (even shorter) -->
    <line class="fade-in" x1="50" y1="85" x2="50" y2="100" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />

    <!-- Teardrop Shape (shifted further up) -->
    <path class="fade-in" d="M 50 147.4 L 34.7 111 A 16 16 0 1 1 65.3 111 Z" fill="#FFFFFF" />
  </g>
</svg>
